<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق الأزرار- الرئيسية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* تصميم العنوان الجديد */
        h1 { font-size: 4rem; margin-bottom: 5px; text-shadow: 0 0 20px rgba(255,204,0,0.5); color: #ffcc00; text-align: center; }
        p { font-size: 1.5rem; color: #aaa; margin-bottom: 40px; text-align: center; font-weight: bold; }
        
        /* أزرار الدخول */
        .btn { width: 80%; max-width: 320px; padding: 20px; font-size: 1.5rem; font-family: 'Cairo', sans-serif; border-radius: 15px; border: none; margin: 15px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        
        .btn-host { background: #fff; color: #000; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-host:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.4); }
        
        .btn-player { background: #007bff; color: #fff; box-shadow: 0 5px 15px rgba(0,123,255,0.4); }
        .btn-player:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,123,255,0.6); }
    </style>
</head>
<body>
    
    <h1>سباق الازرار</h1>
    

    <button class="btn btn-host" onclick="window.location.href='/host'">إنشاء غرفة (للمقدم)</button>
    <button class="btn btn-player" onclick="window.location.href='/player'">دخول غرفة (للاعب)</button>

</body>
</html>
